<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Arcade Hub</title>
  <link rel="stylesheet" href="./assets/styles/portal.css">
</head>
<body>
  <div class="hub-layout" id="hub-root">
    <aside class="hub-sidebar" aria-label="小游戏导航">
      <div class="brand">
        <h1>Mini Arcade</h1>
        <p>左侧底部切换游戏，右侧直接开玩。</p>
      </div>

      <div class="sidebar-main">
        <h2 id="game-title">扫雷</h2>
        <p id="game-desc">经典扫雷，支持缩放、高对比和防误触。</p>
        <ul class="meta-list">
          <li>目录已拆分为可扩展结构</li>
          <li>每个小游戏可独立开发与发布</li>
          <li>统一由大厅页路由与加载</li>
        </ul>
      </div>

      <div class="sidebar-bottom">
        <p class="selector-label">小游戏选择</p>
        <div id="game-selector" class="game-selector" role="listbox" aria-label="游戏列表"></div>
      </div>
    </aside>

    <main class="hub-main" aria-label="游戏窗口">
      <iframe id="game-frame" class="game-frame" title="小游戏内容区" loading="eager"></iframe>
    </main>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
